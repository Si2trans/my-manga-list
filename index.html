<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Si2trans</title>
    
    <link rel="icon" type="image/png" href="favicon.png"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">Si2trans</div>

    <div class="search-container">
        <input type="text" id="manga-search" placeholder="ค้นหาชื่อมังงะ...">
    </div>

    <div class="manga-container" id="skeleton-loader">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
    </div>

    <div class="manga-container" id="manga-list"></div>
    
    <div class="footer-links">
        <a href="https://mynovel.co/w/Si2trans" class="link-blue">
            <img src="images/icon-mynovel.png" style="width:20px; height:20px; vertical-align:middle; margin-right:8px; object-fit:contain;">
            MYNOVEL
        </a>
        <a href="https://readrealm.co/profile/si2transs" class="link-purple">
            <img src="images/icon-readrealm.png" style="width:20px; height:20px; vertical-align:middle; margin-right:8px; object-fit:contain;">
            ReadRealm
        </a>
        <a href="https://readtoon.com/profile/si2trans" class="link-light-purple">
            <img src="images/icon-readtoon.png" style="width:20px; height:20px; vertical-align:middle; margin-right:8px; object-fit:contain;">
            ReadToon
        </a>
    </div>

    <div id="manga-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modal-img" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <div class="status-badge" id="modal-status"></div>
                    <div class="description-container">
                        <h3>เรื่องย่อ</h3>
                        <p id="modal-description"></p>
                    </div>
                    <div id="modal-links" class="modal-buttons">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
