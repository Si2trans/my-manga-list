<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Si2Trans</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@300;400;600;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DYNAMIC BACKGROUND -->
<div class="bg-blur" id="bg-blur"></div>
<div class="bg-dim"></div>
<div class="scanlines"></div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo-block">
      <div class="logo-mark">
        <span class="logo-s">S</span><span class="logo-i">i</span><span class="logo-2">2</span>
      </div>
      <div class="logo-text-block">
        <div class="logo-main">TRANS</div>
        <div class="logo-sub">มังฮัวแปลไทย</div>
      </div>
    </div>
    <div class="header-line"></div>
  </div>
</header>

<!-- CONTROL BAR -->
<div class="control-bar">
  <div class="control-inner">
    <div class="search-box" role="search">
      <svg class="search-svg" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 10L13.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search" placeholder="ค้นหามังงะ..." aria-label="ค้นหามังงะ">
      <button class="search-clear" id="search-clear" style="display:none" aria-label="ล้างการค้นหา">✕</button>
    </div>
    <div class="filter-tabs" role="group" aria-label="กรองตามสถานะ">
      <button class="ftab active" data-filter="all">ทั้งหมด</button>
      <button class="ftab" data-filter="อัปเดต">อัปเดต</button>
      <button class="ftab" data-filter="จบ">จบแล้ว</button>
      <button class="ftab" data-filter="ใหม่">ใหม่</button>
      <button class="ftab" data-filter="หยุด">หยุด</button>
    </div>
  </div>
</div>

<!-- MANGA GRID -->
<main class="grid-section">
  <div class="grid-header">
    <div class="grid-title-line">
      <div class="grid-title-accent"></div>
      <h2 class="grid-title">MANGA LIST</h2>
    </div>
    <div class="grid-count" id="grid-count">— รายการ</div>
  </div>

  <div class="manga-grid" id="skeleton-grid">
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
  </div>

  <div class="manga-grid" id="manga-grid" style="display:none"></div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-logo">SI2TRANS</div>
    <p class="footer-tagline"></p>
    <div class="footer-platforms">
      <a href="https://mynovel.co/w/Si2trans" target="_blank" rel="noopener noreferrer" class="plat-btn plat-mynovel">
        <img src="images/icon-mynovel.png" onerror="this.style.display='none'" alt="MyNovel"> <span>MYNOVEL</span>
      </a>
      <a href="https://readrealm.co/profile/si2transs" target="_blank" rel="noopener noreferrer" class="plat-btn plat-readrealm">
        <img src="images/icon-readrealm.png" onerror="this.style.display='none'" alt="ReadRealm"> <span>ReadRealm</span>
      </a>
      <a href="https://readtoon.com/profile/si2trans" target="_blank" rel="noopener noreferrer" class="plat-btn plat-readtoon">
        <img src="images/icon-readtoon.png" onerror="this.style.display='none'" alt="ReadToon"> <span>ReadToon</span>
      </a>
    </div>
    <div class="footer-copy"></div>
  </div>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-container">
    <div class="modal-bg-art" id="modal-bg-art" aria-hidden="true"></div>
    <div class="modal-bg-dim" aria-hidden="true"></div>
    <button class="modal-close-btn" id="modal-close" aria-label="ปิด">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M2 2L16 16M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="modal-inner">
      <div class="modal-poster-col">
        <div class="modal-poster-wrap">
          <img id="modal-img" src="" alt="">
          <div class="modal-poster-shine"></div>
        </div>
      </div>
      <div class="modal-info-col">
        <div class="modal-tags-row">
          <span class="modal-status-tag" id="modal-status">—</span>
          <span class="modal-chapter-tag" id="modal-chapter"></span>
        </div>
        <h2 class="modal-title" id="modal-title">—</h2>
        <div class="modal-divider"></div>

        <!-- TAB BAR -->
        <div class="modal-tabs" id="modal-tabs">
          <button class="mtab active" data-tab="detail">รายละเอียด</button>
          <button class="mtab" data-tab="power" id="tab-power-btn">⚡ ระดับพลัง</button>
        </div>

        <!-- TAB: รายละเอียด -->
        <div class="modal-tab-panel" id="tab-detail">
          <p class="modal-desc" id="modal-desc">—</p>
          <div class="modal-read-label">อ่านได้ที่</div>
          <div class="modal-links" id="modal-links"></div>
        </div>

        <!-- TAB: ระดับพลัง -->
        <div class="modal-tab-panel" id="tab-power" style="display:none">
          <div id="modal-power"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>
</body>
</html>
